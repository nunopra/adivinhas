<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adivinhas</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg1:    #fef9e7;
      --bg2:    #fde68a;
      --ink:    #78350f;
      --muted:  #b45309;
      --card:   #ffffff;
      --amber:  #f59e0b;
      --amber2: #d97706;
      --green:  #059669;
      --green2: #047857;
      --sh:     rgba(120, 53, 15, 0.12);
    }

    body {
      min-height: 100vh;
      background: linear-gradient(160deg, var(--bg1) 0%, var(--bg2) 100%);
      font-family: 'Nunito', sans-serif;
      color: var(--ink);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 4rem;
    }

    .wrapper { width: 100%; max-width: 420px; }

    header { text-align: center; margin-bottom: 1.75rem; }
    .icon  { font-size: 2.75rem; display: block; margin-bottom: 0.2rem; }
    h1     { font-size: 1.8rem; font-weight: 900; color: var(--ink); }
    .sub   { color: var(--muted); font-size: 0.88rem; font-weight: 600; margin-top: 0.2rem; }

    .card {
      background: var(--card);
      border-radius: 1.25rem;
      padding: 1.5rem;
      box-shadow: 0 4px 16px var(--sh);
      margin-bottom: 1rem;
    }

    .label {
      font-size: 0.7rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.7rem;
    }

    .themes {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
      margin-bottom: 1.25rem;
    }

    .theme-btn {
      background: #fef3c7;
      border: 2px solid transparent;
      border-radius: 0.75rem;
      padding: 0.6rem 0.3rem 0.5rem;
      cursor: pointer;
      text-align: center;
      font-family: 'Nunito', sans-serif;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .theme-btn:hover    { background: #fde68a; }
    .theme-btn.selected { background: #fef3c7; border-color: var(--amber); }
    .theme-btn:active   { transform: scale(0.95); }

    .theme-em  { font-size: 1.5rem; display: block; line-height: 1; }
    .theme-lbl { font-size: 0.72rem; font-weight: 800; margin-top: 0.3rem; display: block; color: var(--ink); }

    .btn-gerar {
      width: 100%;
      padding: 0.9rem;
      background: var(--amber);
      color: #fff;
      border: none;
      border-radius: 0.9rem;
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, opacity 0.2s;
    }
    .btn-gerar:hover:not(:disabled) { background: var(--amber2); }
    .btn-gerar:active:not(:disabled) { transform: scale(0.98); }
    .btn-gerar:disabled { opacity: 0.35; cursor: not-allowed; }

    .loading {
      display: none;
      text-align: center;
      padding: 3rem 1rem;
    }
    .loading-icon {
      font-size: 2.75rem;
      display: inline-block;
      animation: spin 1.2s linear infinite;
    }
    @keyframes spin {
      0%   { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .loading p { color: var(--muted); font-weight: 700; margin-top: 0.75rem; font-size: 0.9rem; }

    .error-msg {
      display: none;
      background: rgba(220,38,38,0.08);
      border: 1px solid rgba(220,38,38,0.25);
      border-radius: 0.75rem;
      padding: 0.9rem;
      color: #b91c1c;
      font-size: 0.875rem;
      text-align: center;
      margin-bottom: 1rem;
    }

    .riddles { display: none; }

    .riddle-card {
      background: var(--card);
      border-radius: 1.25rem;
      box-shadow: 0 4px 16px var(--sh);
      padding: 1.35rem 1.35rem 1.1rem;
      margin-bottom: 0.85rem;
      animation: fadeUp 0.4s ease forwards;
      opacity: 0;
    }
    .riddle-card:nth-child(1) { animation-delay: 0s; }
    .riddle-card:nth-child(2) { animation-delay: 0.1s; }
    .riddle-card:nth-child(3) { animation-delay: 0.2s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .riddle-num {
      font-size: 0.68rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 0.5rem;
    }

    .riddle-q {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.6;
      color: var(--ink);
      margin-bottom: 0.85rem;
    }

    .btn-reveal {
      width: 100%;
      padding: 0.6rem;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: 0.6rem;
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-reveal:hover  { background: var(--green2); }
    .btn-reveal:active { transform: scale(0.97); }
    .btn-reveal.shown  { background: #d1fae5; color: var(--green2); cursor: default; }

    .riddle-a {
      display: none;
      margin-top: 0.75rem;
      padding: 0.7rem 1rem;
      background: #ecfdf5;
      border-radius: 0.6rem;
      font-size: 1rem;
      font-weight: 800;
      color: var(--green2);
      text-align: center;
      animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85); }
      to   { opacity: 1; transform: scale(1); }
    }

    .actions {
      display: none;
      flex-direction: column;
      gap: 0.6rem;
      margin-top: 0.25rem;
    }
    .actions.show { display: flex; }

    .btn-mais {
      width: 100%;
      padding: 0.8rem;
      background: var(--amber);
      color: #fff;
      border: none;
      border-radius: 0.9rem;
      font-family: 'Nunito', sans-serif;
      font-size: 0.92rem;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }
    .btn-mais:hover  { background: var(--amber2); }
    .btn-mais:active { transform: scale(0.98); }

    .btn-nova {
      width: 100%;
      padding: 0.75rem;
      background: rgba(0,0,0,0.06);
      color: var(--muted);
      border: none;
      border-radius: 0.9rem;
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      font-weight: 800;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-nova:hover { background: rgba(0,0,0,0.1); }

    @media (prefers-reduced-motion: reduce) {
      .loading-icon, .riddle-card, .riddle-a { animation: none; opacity: 1; }
    }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <span class="icon">🤔</span>
    <h1>Adivinhas</h1>
    <p class="sub">Escolhe o tema e tenta adivinhar!</p>
  </header>

  <div id="errorMsg" class="error-msg"></div>

  <div class="card" id="formCard">
    <div class="label">Tema</div>
    <div class="themes" id="themes">
      <button class="theme-btn" data-value="animais">
        <span class="theme-em">🐾</span><span class="theme-lbl">Animais</span>
      </button>
      <button class="theme-btn" data-value="frutas e legumes">
        <span class="theme-em">🍎</span><span class="theme-lbl">Frutas</span>
      </button>
      <button class="theme-btn" data-value="transportes">
        <span class="theme-em">🚗</span><span class="theme-lbl">Transportes</span>
      </button>
      <button class="theme-btn" data-value="natureza">
        <span class="theme-em">🌈</span><span class="theme-lbl">Natureza</span>
      </button>
      <button class="theme-btn" data-value="objetos da casa">
        <span class="theme-em">🏠</span><span class="theme-lbl">Casa</span>
      </button>
      <button class="theme-btn" data-value="alimentos e comida">
        <span class="theme-em">🍕</span><span class="theme-lbl">Comida</span>
      </button>
    </div>
    <button class="btn-gerar" id="btnGerar" disabled>🤔 Gerar Adivinhas</button>
  </div>

  <div class="loading" id="loading">
    <span class="loading-icon">💭</span>
    <p>A pensar nas adivinhas…</p>
  </div>

  <div class="riddles" id="riddles"></div>

  <div class="actions" id="actions">
    <button class="btn-mais" id="btnMais">✨ Mais adivinhas do mesmo tema</button>
    <button class="btn-nova" onclick="resetForm()">← Escolher outro tema</button>
  </div>

</div>
<script>
  let tema = null;

  const btnGerar = document.getElementById('btnGerar');
  const formCard = document.getElementById('formCard');
  const loading  = document.getElementById('loading');
  const riddlesEl= document.getElementById('riddles');
  const actions  = document.getElementById('actions');
  const errorMsg = document.getElementById('errorMsg');

  document.getElementById('themes').querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      tema = btn.dataset.value;
      btnGerar.disabled = false;
    });
  });

  btnGerar.addEventListener('click', () => generate());
  document.getElementById('btnMais').addEventListener('click', () => generate());

  async function generate() {
    errorMsg.style.display = 'none';
    formCard.style.display = 'none';
    riddlesEl.style.display = 'none';
    actions.classList.remove('show');
    loading.style.display = 'block';

    try {
      const res  = await fetch('/api/adivinha', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ tema })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Erro desconhecido');

      loading.style.display = 'none';
      renderRiddles(data.adivinhas);

    } catch (err) {
      loading.style.display = 'none';
      formCard.style.display = 'block';
      errorMsg.textContent = err.message;
      errorMsg.style.display = 'block';
    }
  }

  function renderRiddles(adivinhas) {
    riddlesEl.innerHTML = '';
    adivinhas.forEach((a, i) => {
      const card = document.createElement('div');
      card.className = 'riddle-card';
      card.innerHTML = `
        <div class="riddle-num">Adivinha ${i + 1}</div>
        <div class="riddle-q">${a.pergunta}</div>
        <button class="btn-reveal" onclick="reveal(this, '${esc(a.resposta)}')">👀 Ver resposta</button>
        <div class="riddle-a"></div>`;
      riddlesEl.appendChild(card);
    });
    riddlesEl.style.display = 'block';
    actions.classList.add('show');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function reveal(btn, resposta) {
    if (btn.classList.contains('shown')) return;
    btn.classList.add('shown');
    btn.textContent = '✅ Resposta revelada';
    const ansEl = btn.nextElementSibling;
    ansEl.textContent = '💡 ' + resposta;
    ansEl.style.display = 'block';
  }

  function esc(s) { return s.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

  function resetForm() {
    riddlesEl.style.display = 'none';
    actions.classList.remove('show');
    formCard.style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
